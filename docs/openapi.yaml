openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: REST API for an e-commerce application built with Node.js, Express, and PostgreSQL.

servers:
  - url: http://localhost:4001
    description: Local development server

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Products
  - name: Cart
  - name: Orders

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: string
        inventory_quantity:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string

    CartItem:
      type: object
      properties:
        id:
          type: integer
        cart_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        status:
          type: string
        total:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

paths:
  /:
    get:
      tags:
        - Health
      summary: Check API status
      responses:
        '200':
          description: API is running

  /health/db:
    get:
      tags:
        - Health
      summary: Check database connection
      responses:
        '200':
          description: Database connection is healthy

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Missing required fields
        '409':
          description: User already exists

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '400':
          description: Missing required fields
        '401':
          description: Invalid email or password

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current authenticated user token payload
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
        '401':
          description: Authorization token required or invalid

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User found
        '404':
          description: User not found

    put:
      tags:
        - Users
      summary: Update user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: User updated successfully
        '400':
          description: At least one field is required
        '404':
          description: User not found
        '409':
          description: Username or email already exists

    delete:
      tags:
        - Users
      summary: Delete user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted successfully
        '404':
          description: User not found

  /products:
    get:
      tags:
        - Products
      summary: Get all products
      responses:
        '200':
          description: List of products

    post:
      tags:
        - Products
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - inventoryQuantity
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                inventoryQuantity:
                  type: integer
      responses:
        '201':
          description: Product created successfully
        '400':
          description: Missing required fields

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
        '404':
          description: Product not found

    put:
      tags:
        - Products
      summary: Update product by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                inventoryQuantity:
                  type: integer
      responses:
        '200':
          description: Product updated successfully
        '404':
          description: Product not found

    delete:
      tags:
        - Products
      summary: Delete product by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted successfully
        '404':
          description: Product not found

  /cart/{userId}:
    get:
      tags:
        - Cart
      summary: Get user cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User cart

    delete:
      tags:
        - Cart
      summary: Clear user cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart cleared successfully

  /cart/{userId}/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: integer
                quantity:
                  type: integer
      responses:
        '201':
          description: Item added to cart
        '400':
          description: Invalid request
        '404':
          description: Product not found

  /cart/{userId}/items/{productId}:
    put:
      tags:
        - Cart
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
      responses:
        '200':
          description: Cart item updated successfully
        '404':
          description: Cart item not found

    delete:
      tags:
        - Cart
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart item removed successfully
        '404':
          description: Cart item not found

  /orders:
    get:
      tags:
        - Orders
      summary: Get all orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of orders

  /orders/{userId}:
    post:
      tags:
        - Orders
      summary: Create order from user cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Order created successfully
        '400':
          description: Cart is empty or invalid

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
        '404':
          description: Order not found

    put:
      tags:
        - Orders
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Order updated successfully
        '400':
          description: Status is required
        '404':
          description: Order not found

    delete:
      tags:
        - Orders
      summary: Delete order by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order deleted successfully
        '404':
          description: Order not found

  /orders/user/{userId}:
    get:
      tags:
        - Orders
      summary: Get all orders for one user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User orders